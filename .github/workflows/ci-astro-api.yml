# Thin Dagger adapter — Astro static APIs (constants, countries-plus, dynasties, ragas, rto, mmi-tickertape).
# Downstream: uses: chirag127/workflows/.github/workflows/ci-astro-api.yml@v1
# Cache: cacheVolume("pnpm-store") wired inside dagger/astro-api module.
name: ci-astro-api
on:
  workflow_call:
jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dagger/dagger-for-github@v8.4.1
        with:
          version: latest
          module: ./dagger/astro-api
          call: ci --source=.
