# Thin Dagger adapter — Astro static APIs (constants, countries-plus, dynasties, ragas, rto, mmi-tickertape).
# Downstream: uses: chirag127/workflows/.github/workflows/ci-astro-api.yml@v1
# Cache: cacheVolume("pnpm-store") wired inside dagger/astro-api module.
name: ci-astro-api
on:
  workflow_call:
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dagger/dagger-for-github@v8.4.1
        with:
          version: latest
          module: github.com/chirag127/workflows/dagger/astro-api@main
          call: ci --source=.

  strix:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Strix
        run: curl -sSL https://strix.ai/install | bash
      - name: Run Strix
        env:
          STRIX_LLM: openai/@cf/meta/llama-4-scout-17b-16e-instruct
          LLM_API_KEY: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          LLM_API_BASE: https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/ai/v1
        run: strix -n -t ./ --scan-mode quick