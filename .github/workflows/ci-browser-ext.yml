# Thin Dagger adapter — browser extensions (bookmark-mind-bs-ext).
# Downstream: uses: chirag127/workflows/.github/workflows/ci-browser-ext.yml@main
# Cache: cacheVolume("pnpm-store") wired inside dagger/browser-ext module.
name: ci-browser-ext
on:
  workflow_call:
jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dagger/dagger-for-github@v8.4.1
        with:
          version: latest
          module: github.com/chirag127/workflows/dagger/browser-ext@main
          call: ci --source=.
