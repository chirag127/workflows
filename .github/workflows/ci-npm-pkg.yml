# Thin Dagger adapter — publishable npm packages (api-fleet-template).
# Downstream: uses: chirag127/workflows/.github/workflows/ci-npm-pkg.yml@main
# Cache: cacheVolume("pnpm-store") wired inside dagger/npm-pkg module.
name: ci-npm-pkg
on:
  workflow_call:
jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dagger/dagger-for-github@v8.4.1
        with:
          version: latest
          module: github.com/chirag127/workflows/dagger/npm-pkg@main
          call: ci --source=.
