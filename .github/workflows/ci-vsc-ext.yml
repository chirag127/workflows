# Thin Dagger adapter — VS Code extensions (sops-lens-vsc-ext).
# Downstream: uses: chirag127/workflows/.github/workflows/ci-vsc-ext.yml@main
# Cache: cacheVolume("pnpm-store") wired inside dagger/vsc-ext module.
name: ci-vsc-ext
on:
  workflow_call:
jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dagger/dagger-for-github@v8.4.1
        with:
          version: latest
          module: github.com/chirag127/workflows/dagger/vsc-ext@main
          call: ci --source=.
