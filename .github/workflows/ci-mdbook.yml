# Thin Dagger adapter — mdBook books (janaushdhi-book).
# Downstream: uses: chirag127/workflows/.github/workflows/ci-mdbook.yml@main
# Cache: cacheVolume("cargo-registry") wired inside dagger/mdbook module.
name: ci-mdbook
on:
  workflow_call:
jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dagger/dagger-for-github@v8.4.1
        with:
          version: latest
          module: github.com/chirag127/workflows/dagger/mdbook@main
          call: ci --source=.
