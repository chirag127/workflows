# MegaLinter reusable workflow — chirag127 fleet
#
# Downstream: uses: chirag127/workflows/.github/workflows/megalinter.yml@main
#
# Findings post to PR + upload as artifact but do NOT gate CI. To gate:
#   - fix the findings, OR
#   - add per-repo .gitleaks.toml / .checkov.yml / .jscpd.json allowlists, OR
#   - override with 'continue-on-error: false' in your calling workflow

name: megalinter
on:
  workflow_call: {}

concurrency:
  group: megalinter-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  megalinter:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure fleet MegaLinter config
        run: |
          if [ ! -f .mega-linter.yml ]; then
            curl -fsSL https://raw.githubusercontent.com/chirag127/workflows/main/.mega-linter.yml -o .mega-linter.yml
            echo "Using fleet-wide .mega-linter.yml"
          else
            echo "Using repo's own .mega-linter.yml"
          fi

      - name: MegaLinter
        id: ml
        continue-on-error: true
        uses: oxsecurity/megalinter/flavors/javascript@v8
        env:
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISABLE_ERRORS: true

      - name: Upload MegaLinter reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: megalinter-reports
          path: |
            megalinter-reports
            mega-linter.log
          retention-days: 14

      - name: Summarize findings
        if: always()
        run: |
          echo "## MegaLinter Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f mega-linter.log ]; then
            grep -E "❌|⚠️" mega-linter.log | head -50 >> $GITHUB_STEP_SUMMARY || true
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Full reports in the megalinter-reports artifact. Gating is currently ADVISORY across the fleet." >> $GITHUB_STEP_SUMMARY
