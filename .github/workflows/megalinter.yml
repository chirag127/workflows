# MegaLinter reusable workflow — chirag127 fleet
#
# Downstream: uses: chirag127/workflows/.github/workflows/megalinter.yml@main
#
# Runs the full MegaLinter suite per the fleet-wide .mega-linter.yml config
# in this repo (security+correctness gate, style advisory). Downstream repos
# can override any setting via their own .mega-linter.yml at repo root,
# which extends the fleet config.
#
# Cost: ~3GB Docker pull, 3-8 minutes per run. Cache the image on hosted
# runners via the megalinter action's built-in caching.

name: megalinter
on:
  workflow_call:
    inputs:
      flavor:
        description: MegaLinter flavor (javascript | cupcake | all)
        required: false
        default: javascript
        type: string

concurrency:
  group: megalinter-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  megalinter:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks + trufflehog need history

      # Pull the fleet-wide .mega-linter.yml if the repo doesn't have one
      - name: Ensure fleet MegaLinter config
        run: |
          if [ ! -f .mega-linter.yml ]; then
            curl -fsSL https://raw.githubusercontent.com/chirag127/workflows/main/.mega-linter.yml -o .mega-linter.yml
            echo "Using fleet-wide .mega-linter.yml"
          else
            echo "Using repo's own .mega-linter.yml"
          fi

      - name: MegaLinter
        id: ml
        uses: oxsecurity/megalinter/flavors/${{ inputs.flavor }}@v8
        env:
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload MegaLinter reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: megalinter-reports
          path: |
            megalinter-reports
            mega-linter.log
          retention-days: 14
