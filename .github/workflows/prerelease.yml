# Cut a GitHub Release when a version tag is pushed (v1, v1.2.0, v2.0.0-rc.1, …).
# Pre-release tags (containing '-') are marked as prerelease.
# Downstream repos pin @v1 etc.; this publishes the release notes for each tag.
name: prerelease
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)release, e.g. v1.2.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve tag
        id: tag
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if printf '%s' "$tag" | grep -q '-'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create / update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          flag=""
          [ "${{ steps.tag.outputs.prerelease }}" = "true" ] && flag="--prerelease"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --generate-notes $flag
          else
            gh release create "$tag" --title "$tag" --generate-notes $flag
          fi
