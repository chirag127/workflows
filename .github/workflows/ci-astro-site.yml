# Thin Dagger adapter — Astro static sites (blog, home, me, journal).
# Downstream: uses: chirag127/workflows/.github/workflows/ci-astro-site.yml@v1
# Cache: cacheVolume("pnpm-store") wired inside dagger/astro-site module.
name: ci-astro-site
on:
  workflow_call:
jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dagger/dagger-for-github@v8.4.1
        with:
          version: latest
          module: ./dagger/astro-site
          call: ci --source=.
