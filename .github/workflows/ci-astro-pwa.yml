# Thin Dagger adapter — Astro PWAs (ncert-textbooks-app, janaushdhi-medicine-finder-app, lore-app).
# Downstream: uses: chirag127/workflows/.github/workflows/ci-astro-pwa.yml@main
# Cache: cacheVolume("pnpm-store") wired inside dagger/astro-pwa module.
name: ci-astro-pwa
on:
  workflow_call:
jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dagger/dagger-for-github@v8.4.1
        with:
          version: latest
          module: github.com/chirag127/workflows/dagger/astro-pwa@main
          call: ci --source=.
