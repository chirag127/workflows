# MegaLinter v8 config — Astro/TypeScript/Node project family
# Excludes: PHP, RUBY, PYTHON, SCALA, KOTLIN, JAVA, GO, RUST (upstream fork concerns)

APPLY_FIXES: all
VALIDATE_ALL_CODEBASE: false
REPORT_OUTPUT_FOLDER: /tmp/megalinter-reports

ENABLE_LINTERS:
  # TypeScript / JavaScript
  - TYPESCRIPT_ES
  - TYPESCRIPT_STANDARD
  - JAVASCRIPT_ES
  - JAVASCRIPT_STANDARD
  # CSS
  - CSS_STYLELINT
  # HTML
  - HTML_HTMLHINT
  # JSON
  - JSON_JSONLINT
  - JSON_PRETTIER
  # YAML
  - YAML_YAMLLINT
  - YAML_PRETTIER
  # Markdown
  - MARKDOWN_MARKDOWNLINT
  - MARKDOWN_MARKDOWN_LINK_CHECK
  # Docker
  - DOCKERFILE_HADOLINT
  # Spelling
  - SPELL_CSPELL

DISABLE_LINTERS:
  - PHP_PHPCS
  - PHP_PHPSTAN
  - PHP_PSALM
  - RUBY_RUBOCOP
  - PYTHON_PYLINT
  - PYTHON_FLAKE8
  - PYTHON_BLACK
  - PYTHON_MYPY
  - SCALA_SCALAFIX
  - KOTLIN_KTLINT
  - JAVA_CHECKSTYLE
  - GO_GOLANGCI_LINT
  - RUST_CLIPPY

# Per-linter overrides
TYPESCRIPT_ES_CONFIG_FILE: .eslintrc.json
JAVASCRIPT_ES_CONFIG_FILE: .eslintrc.json
CSS_STYLELINT_CONFIG_FILE: .stylelintrc.json
YAML_YAMLLINT_CONFIG_FILE: .yamllint.yml
MARKDOWN_MARKDOWNLINT_CONFIG_FILE: .markdownlint.json

# Ignore paths
FILTER_REGEX_EXCLUDE: (\.git|node_modules|dist|\.astro|build|\.cache|pnpm-lock\.yaml)
